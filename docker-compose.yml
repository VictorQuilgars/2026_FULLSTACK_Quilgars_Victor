services:
  postgres:
    image: postgres:16-alpine
    container_name: roz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: car_wash
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: roz-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/car_wash
      NODE_ENV: development
      CLIENT_URL: http://localhost:3000
      PORT: 4000
    command: sh -c "npx prisma generate && npx prisma db push && npm run dev"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:4000/api/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: roz-client
    restart: unless-stopped
    env_file:
      - ./client/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      API_URL_SERVER: http://server:4000/api
      APP_BASE_URL: http://localhost:3000
      HOSTNAME: 0.0.0.0
      PORT: 3000
      WATCHPACK_POLLING: "true"
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
      - client_next:/app/.next

volumes:
  postgres_data:
  server_node_modules:
  client_node_modules:
  client_next:
