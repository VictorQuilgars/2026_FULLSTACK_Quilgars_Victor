services:
  postgres:
    image: postgres:16-alpine
    container_name: roz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: car_wash
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: roz-server
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/car_wash
      NODE_ENV: development
      CLIENT_URL: http://localhost:3000
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: roz-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      API_URL_SERVER: http://server:4000/api
      APP_BASE_URL: http://localhost:3000
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
      AUTH0_SECRET: ${AUTH0_SECRET}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
    depends_on:
      - server
    volumes:
      - ./client/app:/app/app
      - ./client/components:/app/components
      - ./client/lib:/app/lib
      - ./client/types:/app/types
      - ./client/constants:/app/constants
      - ./client/public:/app/public

volumes:
  postgres_data:
